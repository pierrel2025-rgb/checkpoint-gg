{% extends "layout.html" %}

{% block body %}

<h2>My Games</h2>

<form action="/add_game" method="post">

    <input name="title" placeholder="Game Title" required>

    <input name="platform" placeholder="Platform" required>

    <select name="status">

        <option>Backlog</option>

        <option>Playing</option>

        <option>Completed</option>

    </select>

    <button type="submit">
        Add Game
    </button>

</form>

<hr>

{% for game in games %}

<p>

    {{ game[2] }}

    |

    {{ game[3] }}

    |

    {{ game[4] }}

    <a href="/delete/{{ game[0] }}">
        Delete
    </a>

</p>

{% endfor %}

<a href="/logout">
    Logout
</a>

{% endblock %}
